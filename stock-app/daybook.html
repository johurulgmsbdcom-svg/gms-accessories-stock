<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day Book — GMS Accessories Stock</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-strong: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
        }

        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-bg-strong: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-3d {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0a1628 0%, #1a1a3e 25%, #0f2027 50%, #203a43 75%, #0a1628 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        [data-theme="light"] .bg-3d {
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 25%, #dbeafe 50%, #e0e7ff 75%, #f0f4ff 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, var(--accent-blue), transparent); top: -100px; right: -100px; }
        .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, var(--accent-purple), transparent); bottom: -80px; left: -80px; animation-delay: -5s; }
        .orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, var(--accent-pink), transparent); top: 50%; left: 50%; animation-delay: -10s; }
        .orb-4 { width: 180px; height: 180px; background: radial-gradient(circle, var(--accent-cyan), transparent); top: 20%; left: 10%; animation-delay: -15s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 10px) scale(1.05); }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        .header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 22, 40, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        [data-theme="light"] .header { background: rgba(255, 255, 255, 0.8); }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            width: 38px; height: 38px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 18px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .header-title {
            font-size: 16px; font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        [data-theme="light"] .header-title {
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .header-actions { display: flex; gap: 8px; }

        .header-btn {
            width: 38px; height: 38px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-primary);
            font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }

        .header-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

        .page-title {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }

        .page-title h2 {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            display: flex; align-items: center; gap: 10px;
        }

        .page-title h2 i { -webkit-text-fill-color: var(--accent-blue); }

        .title-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px; border: none; border-radius: 10px;
            font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px; color: white;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2); }

        .btn-excel { background: linear-gradient(135deg, var(--accent-green), #059669); }
        .btn-print { background: linear-gradient(135deg, var(--accent-cyan), #0891b2); }
        .btn-reset { background: linear-gradient(135deg, var(--accent-yellow), #d97706); color: #1e293b; }
        .btn-search { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); }

        .btn-sm {
            padding: 7px 12px; font-size: 11.5px; border-radius: 8px;
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            color: var(--text-secondary); cursor: pointer; font-family: 'Poppins', sans-serif;
            font-weight: 600; transition: all 0.2s;
        }
        .btn-sm:hover { background: rgba(59,130,246,0.2); color: var(--text-primary); border-color: var(--accent-blue); }
        .btn-sm.active { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border-color: transparent; }

        .filter-card { padding: 20px; margin-bottom: 20px; animation: fadeInUp 0.5s ease; }

        .filter-title {
            font-size: 14px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .filter-title i { color: var(--accent-blue); }

        .quick-ranges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

        .view-toggle { display: flex; gap: 8px; margin-bottom: 16px; }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .filter-group { display: flex; flex-direction: column; gap: 6px; }

        .filter-group label {
            font-size: 11px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .filter-group input, .filter-group select {
            padding: 10px 12px; border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif; font-size: 13px;
            outline: none; transition: all 0.3s;
        }

        [data-theme="light"] .filter-group input,
        [data-theme="light"] .filter-group select { background: rgba(255, 255, 255, 0.7); }

        .filter-group input:focus, .filter-group select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card { padding: 16px; text-align: center; transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-4px); }

        .stat-card .stat-value { font-size: 20px; font-weight: 800; line-height: 1.2; word-break: break-all; }
        .stat-card .stat-label {
            font-size: 10px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px;
        }

        .stat-card.blue .stat-value { color: var(--accent-blue); }
        .stat-card.green .stat-value { color: var(--accent-green); }
        .stat-card.red .stat-value { color: var(--accent-red); }
        .stat-card.yellow .stat-value { color: var(--accent-yellow); }
        .stat-card.purple .stat-value { color: var(--accent-purple); }

        .table-card { padding: 20px; margin-bottom: 20px; animation: fadeInUp 0.7s ease; }

        .table-wrapper { overflow-x: auto; border-radius: 12px; margin: 0 -4px; }

        table {
            width: 100%; border-collapse: collapse; font-size: 12px;
            min-width: 1000px; border: 1px solid var(--glass-border);
        }

        thead th {
            padding: 12px 10px; text-align: center; font-weight: 700; font-size: 10px;
            text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
            background: rgba(0, 0, 0, 0.25); border: 1px solid var(--glass-border);
            white-space: nowrap; cursor: pointer; user-select: none; transition: all 0.2s;
        }

        [data-theme="light"] thead th { background: rgba(255, 255, 255, 0.5); }

        thead th:hover { color: var(--accent-blue); background: rgba(59, 130, 246, 0.15); }

        thead th .sort-icon { margin-left: 4px; font-size: 9px; opacity: 0.5; }
        thead th.sorted .sort-icon { opacity: 1; color: var(--accent-blue); }

        tbody tr { transition: all 0.2s; }
        tbody tr:hover { background: rgba(59, 130, 246, 0.08); }
        tbody tr:nth-child(even) { background: rgba(255, 255, 255, 0.02); }
        tbody tr:nth-child(even):hover { background: rgba(59, 130, 246, 0.08); }

        tbody td {
            padding: 9px 10px; color: var(--text-secondary); white-space: nowrap;
            font-size: 12px; text-align: center; border: 1px solid var(--glass-border);
        }

        tbody td.date-cell { text-align: left; font-weight: 700; color: var(--text-primary); }
        td.rcvd-val { color: var(--accent-green); font-weight: 600; }
        td.dlvd-val { color: var(--accent-red); font-weight: 600; }
        td.net-pos { color: var(--accent-blue); font-weight: 700; }
        td.net-neg { color: var(--accent-red); font-weight: 700; }

        td.clickable { cursor: pointer; text-decoration: underline dotted; text-underline-offset: 3px; }
        td.clickable:hover { background: rgba(59, 130, 246, 0.18) !important; color: var(--accent-blue) !important; }

        tfoot td {
            padding: 12px 10px; font-weight: 800; font-size: 12px;
            color: var(--text-primary); background: rgba(59, 130, 246, 0.15);
            border: 1px solid var(--glass-border); white-space: nowrap; text-align: center;
        }

        .loading-state, .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .loading-state i { font-size: 40px; color: var(--accent-blue); margin-bottom: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .pagination {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0 0; flex-wrap: wrap; gap: 12px;
        }
        .pagination-info { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .pagination-controls { display: flex; gap: 6px; align-items: center; }

        .page-btn {
            min-width: 36px; height: 36px; padding: 0 12px; border-radius: 8px;
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            color: var(--text-primary); font-family: 'Poppins', sans-serif;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .page-btn:hover:not(:disabled) { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        .page-btn.active { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border-color: transparent; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .per-page-select {
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text-primary);
            font-family: 'Poppins', sans-serif; font-size: 12px; outline: none; cursor: pointer;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10, 22, 40, 0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; padding: 8px 0 10px;
            z-index: 100; overflow-x: auto;
        }
        [data-theme="light"] .bottom-nav { background: rgba(255, 255, 255, 0.9); }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: 600;
            padding: 6px 10px; border-radius: 8px; transition: all 0.3s; flex-shrink: 0;
        }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item:hover { color: var(--accent-blue); }
        .nav-item .nav-icon { font-size: 18px; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: var(--glass-bg-strong); backdrop-filter: blur(20px); color: var(--text-primary);
            padding: 12px 22px; border-radius: 12px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); z-index: 500;
            font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px;
            transition: transform 0.4s ease;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-left: 4px solid var(--accent-red); }
        .toast.success { border-left: 4px solid var(--accent-green); }

        /* ===== Drilldown Modal ===== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: var(--glass-bg-strong); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            max-width: 720px; width: 100%; max-height: 82vh; overflow-y: auto;
            padding: 20px; box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.25s ease;
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px; gap: 10px;
        }
        .modal-header h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .modal-close {
            width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            color: var(--text-primary); cursor: pointer; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: var(--accent-red); border-color: var(--accent-red); color: #fff; }
        table.modal-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 0; }
        table.modal-table th, table.modal-table td {
            padding: 8px 10px; border: 1px solid var(--glass-border); text-align: center;
            color: var(--text-secondary); white-space: nowrap;
        }
        table.modal-table th {
            background: rgba(0,0,0,0.25); color: var(--text-muted); font-size: 10px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .modal-total {
            margin-top: 12px; font-weight: 800; color: var(--text-primary);
            text-align: right; font-size: 13px;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .bg-3d, .orb, .header, .bottom-nav, .filter-card, .page-title, .stats-row, .toast, .title-actions, .modal-overlay { display: none !important; }
            .main { padding: 0 !important; max-width: 100% !important; }
            .table-card { background: white !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
            table { border: 1.5px solid black !important; font-size: 9px !important; }
            thead th, tbody td, tfoot td { border: 1px solid black !important; color: black !important; background: white !important; }
            .print-header { display: block !important; text-align: center; margin-bottom: 12px; }
        }
        .print-header { display: none; }

        @media (max-width: 768px) {
            .main { padding: 16px; }
            .filter-grid { grid-template-columns: 1fr 1fr; }
            .page-title h2 { font-size: 18px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .btn { padding: 8px 14px; font-size: 12px; }
        }
        @media (max-width: 480px) {
            .filter-grid { grid-template-columns: 1fr; }
            .title-actions { width: 100%; }
            .title-actions .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-3d"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="print-header">
        <h2>GMS Accessories Stock — Day Book Report</h2>
        <p id="printDate"></p>
    </div>

    <header class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="logo-icon">G</div>
            <div class="header-title">Day Book</div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleTheme()" id="themeBtn" title="Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="page-title">
            <h2><i class="fas fa-book"></i> Daily / Monthly Summary (Day Book)</h2>
            <div class="title-actions">
                <button class="btn btn-reset" onclick="resetFilters()"><i class="fas fa-redo"></i> Reset</button>
                <button class="btn btn-print" onclick="printReport()"><i class="fas fa-print"></i> Print</button>
                <button class="btn btn-excel" onclick="downloadExcel()"><i class="fas fa-file-excel"></i> Excel</button>
            </div>
        </div>

        <div class="filter-card glass">
            <div class="filter-title"><i class="fas fa-filter"></i> Filters</div>

            <div class="quick-ranges">
                <button class="btn-sm" onclick="setQuickRange('today')"><i class="fas fa-calendar-day"></i> Today</button>
                <button class="btn-sm" onclick="setQuickRange('7d')"><i class="fas fa-calendar-week"></i> Last 7 Days</button>
                <button class="btn-sm active" id="rangeBtn30d" onclick="setQuickRange('30d')"><i class="fas fa-calendar-week"></i> Last 30 Days</button>
                <button class="btn-sm" onclick="setQuickRange('thisMonth')"><i class="fas fa-calendar-alt"></i> This Month</button>
                <button class="btn-sm" onclick="setQuickRange('lastMonth')"><i class="fas fa-calendar-alt"></i> Last Month</button>
                <button class="btn-sm" onclick="setQuickRange('thisYear')"><i class="fas fa-calendar"></i> This Year</button>
            </div>

            <div class="view-toggle">
                <button class="btn-sm active" id="viewDaily" onclick="setView('daily')"><i class="fas fa-calendar-day"></i> Daily View</button>
                <button class="btn-sm" id="viewMonthly" onclick="setView('monthly')"><i class="fas fa-calendar-alt"></i> Monthly View</button>
            </div>

            <div class="filter-grid">
                <div class="filter-group">
                    <label>Date From</label>
                    <input type="date" id="fDateFrom">
                </div>
                <div class="filter-group">
                    <label>Date To</label>
                    <input type="date" id="fDateTo">
                </div>
                <div class="filter-group">
                    <label>Buyer</label>
                    <select id="fBuyer">

    <!-- Drilldown Modal: shows individual RCVD / DLVD entries for a clicked day/month -->
    <div class="modal-overlay" id="drilldownModal" onclick="if(event.target===this) closeDrilldown()">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="drilldownTitle">Details</h3>
                <button class="modal-close" onclick="closeDrilldown()"><i class="fas fa-times"></i></button>
            </div>
            <div id="drilldownContent"></div>
        </div>

    <script>
        // ============ SUPABASE ============
        const SUPABASE_URL = 'https://qwtourjspllhiiryqewf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pcQFRFQWWAT1zTXfVfgdSw_43rcVr5S';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============ STATE ============
        let rawTxns = [];
        let summaryRows = [];   // grouped by date or month, sorted ascending chronologically
        let currentPage = 1;
        let perPage = 50;
        let sortColumn = 'period';
        let sortDirection = 'desc'; // default: newest first
        let viewMode = 'daily';     // 'daily' | 'monthly'
        let buyerMap = {};          // buyer_id -> buyer name, used in drilldown modal
        let closingAnchorQty = 0;   // TRUE present stock qty as of the visible range's last day (anchored to items.current_stock)
        let closingAnchorVal = 0;   // TRUE present stock value as of the visible range's last day (anchored to items.current_value)

        // ============ THEME ============
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }
        function updateThemeIcon(theme) {
            const btn = document.getElementById('themeBtn');
            btn.innerHTML = theme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        }
        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeIcon(saved);
        })();

        // ============ TOAST ============
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMsg');
            toast.className = 'toast ' + type;
            icon.className = type === 'error' ? 'fas fa-times-circle' : 'fas fa-check-circle';
            msg.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============ UTILS ============
        function fmt(n) {
            if (n === null || n === undefined || isNaN(n)) return '0';
            return parseFloat(n).toLocaleString('en-US', { maximumFractionDigits: 2 });
        }
        function pad2(n) { return String(n).padStart(2, '0'); }

        // IMPORTANT: never use Date.toISOString().split('T')[0] for "today"/local dates —
        // toISOString() converts to UTC, which in UTC+6 (Dhaka) shifts the date back by
        // one day between midnight and 6 AM local time (e.g. today's postings would be
        // missing). This formats using the LOCAL calendar date instead.
        function toLocalISODate(d) {
            const yyyy = d.getFullYear();
            const mm = pad2(d.getMonth() + 1);
            const dd = pad2(d.getDate());
            return `${yyyy}-${mm}-${dd}`;
        }

        const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

        function monthLabel(ym) {
            const [y, m] = ym.split('-').map(Number);
            return `${MONTH_NAMES[m - 1]} ${y}`;
        }

        // ============ QUICK DATE RANGES ============
        function setQuickRange(type) {
            document.querySelectorAll('.quick-ranges .btn-sm').forEach(b => b.classList.remove('active'));
            const today = new Date();
            let from, to;

            if (type === 'today') {
                from = to = today;
            } else if (type === '7d') {
                to = today;
                from = new Date(today); from.setDate(today.getDate() - 6);
            } else if (type === '30d') {
                to = today;
                from = new Date(today); from.setDate(today.getDate() - 29);
                document.getElementById('rangeBtn30d').classList.add('active');
            } else if (type === 'thisMonth') {
                from = new Date(today.getFullYear(), today.getMonth(), 1);
                to = today;
            } else if (type === 'lastMonth') {
                from = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                to = new Date(today.getFullYear(), today.getMonth(), 0);
            } else if (type === 'thisYear') {
                from = new Date(today.getFullYear(), 0, 1);
                to = today;
            }

            if (type !== '30d') {
                event.target.closest('.btn-sm').classList.add('active');
            }

            document.getElementById('fDateFrom').value = toLocalISODate(from);
            document.getElementById('fDateTo').value = toLocalISODate(to);
            applyFilters();
        }

        // ============ VIEW MODE ============
        function setView(mode) {
            viewMode = mode;
            document.getElementById('viewDaily').classList.toggle('active', mode === 'daily');
            document.getElementById('viewMonthly').classList.toggle('active', mode === 'monthly');
            document.getElementById('statDaysLabel').textContent = mode === 'daily' ? 'Active Days' : 'Active Months';
            currentPage = 1;
            buildSummary();
            renderTable();
        }

        // ============ LOAD FILTERS ============
        async function loadFilters() {
            try {
                const { data: buyers } = await db.from('buyers').select('id, name').order('name');
                const buyerSelect = document.getElementById('fBuyer');
                (buyers || []).forEach(b => {
                    buyerMap[b.id] = b.name;
                    buyerSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`;
                });

                const today = new Date();
                const thirtyDaysAgo = new Date(today);
                thirtyDaysAgo.setDate(today.getDate() - 29);
                document.getElementById('fDateTo').value = toLocalISODate(today);
                document.getElementById('fDateFrom').value = toLocalISODate(thirtyDaysAgo);
            } catch (err) {
                console.error('Load filters error:', err);
            }
        }

        // ============ APPLY FILTERS ============
        function applyFilters() {
            currentPage = 1;
            loadData();
        }

        // ============ LIVE STOCK ANCHOR ============
        // The dashboard's "Total Stock Qty / Total Value" comes straight from the
        // items table (current_stock / current_value columns) — it is NOT simply
        // "sum of all RCVD minus all DLVD ever posted" (there can be manual edits,
        // opening entries, adjustments etc. that never went through the transactions
        // log). So instead of recomputing history from scratch, we anchor the Day
        // Book to that SAME live source, and only use RCVD/DLVD deltas to walk
        // backwards/forwards day by day from that anchor.
        async function getLiveStockTotals(buyerId) {
            try {
                let q = db.from('items').select('current_stock, current_value');
                if (buyerId) q = q.eq('buyer_id', buyerId);
                const { data, error } = await q.limit(200000);
                if (error) throw error;
                let qty = 0, val = 0;
                (data || []).forEach(i => {
                    qty += parseFloat(i.current_stock) || 0;
                    val += parseFloat(i.current_value) || 0;
                });
                return { qty, val };
            } catch (err) {
                console.error('Live stock totals error:', err);
                return { qty: 0, val: 0 };
            }
        }

        // Net RCVD-DLVD activity posted AFTER the visible range's last day — needed to
        // roll the RIGHT-NOW live stock total back to what it was as of dateTo, so the
        // last visible row anchors correctly (usually 0 when dateTo = today).
        async function getFutureNet(dateTo, buyerId) {
            if (!dateTo) return { qty: 0, val: 0 };
            try {
                let q = db
                    .from('transactions')
                    .select(`type, qty, line_value, items:item_id!inner ( buyer_id )`)
                    .in('type', ['RCVD', 'DLVD'])
                    .gt('txn_date', dateTo);
                if (buyerId) q = q.eq('items.buyer_id', buyerId);

                const { data, error } = await q.limit(200000);
                if (error) throw error;

                let qty = 0, val = 0;
                (data || []).forEach(t => {
                    const qy = parseFloat(t.qty) || 0;
                    const vl = parseFloat(t.line_value) || 0;
                    if (t.type === 'RCVD') { qty += qy; val += vl; }
                    else { qty -= qy; val -= vl; }
                });
                return { qty, val };
            } catch (err) {
                console.error('Future net error:', err);
                return { qty: 0, val: 0 };
            }
        }

        // ============ LOAD DATA ============
        async function loadData() {
            const tableContent = document.getElementById('tableContent');
            tableContent.innerHTML = `
                <div class="loading-state">
                    <i class="fas fa-circle-notch"></i>
                    <p>Loading day book data...</p>
                </div>
            `;

            try {
                let query = db
                    .from('transactions')
                    .select(`
                        id, type, txn_date, qty, line_value,
                        items:item_id!inner ( buyer_id )
                    `)
                    .in('type', ['RCVD', 'DLVD'])
                    .order('txn_date', { ascending: true });

                const dateFrom = document.getElementById('fDateFrom').value;
                const dateTo = document.getElementById('fDateTo').value;
                const buyerId = document.getElementById('fBuyer').value;

                if (dateFrom) query = query.gte('txn_date', dateFrom);
                if (dateTo) query = query.lte('txn_date', dateTo);
                if (buyerId) query = query.eq('items.buyer_id', buyerId);

                const [{ data, error }, live, futureNet] = await Promise.all([
                    query.limit(20000),
                    getLiveStockTotals(buyerId),
                    getFutureNet(dateTo, buyerId)
                ]);
                if (error) throw error;

                // Present Stock of the LAST visible day/month = live stock right now,
                // minus whatever has already been posted after that day (if dateTo is
                // today, futureNet is normally 0, so this equals the live total exactly).
                closingAnchorQty = live.qty - futureNet.qty;
                closingAnchorVal = live.val - futureNet.val;

                rawTxns = data || [];
                buildSummary();
                renderTable();

            } catch (err) {
                console.error('Load data error:', err);
                tableContent.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error: ${err.message}</p>
                    </div>
                `;
                showToast('Error loading data', 'error');
            }
        }

        // ============ PERIOD KEYS (fill every day/month in range, even with zero postings) ============
        // Without this, a day/month with NO RCVD/DLVD entries simply never appears —
        // which is why "today" can vanish from the table until something is posted.
        // We instead always list every day (or month) between Date From and Date To,
        // defaulting to zero activity, so today's row always shows its carried-forward
        // Present Stock even before anything is posted for it.
        function generatePeriodKeys(dateFrom, dateTo, mode) {
            if (!dateFrom || !dateTo) return null;
            const keys = [];
            if (mode === 'daily') {
                let cur = new Date(dateFrom + 'T00:00:00');
                const end = new Date(dateTo + 'T00:00:00');
                if (isNaN(cur) || isNaN(end)) return null;
                while (cur <= end) {
                    keys.push(toLocalISODate(cur));
                    cur.setDate(cur.getDate() + 1);
                }
            } else {
                let [y, m] = dateFrom.split('-').map(Number);
                const [ey, em] = dateTo.split('-').map(Number);
                if (!y || !m || !ey || !em) return null;
                while (y < ey || (y === ey && m <= em)) {
                    keys.push(`${y}-${pad2(m)}`);
                    m++;
                    if (m > 12) { m = 1; y++; }
                }
            }
            return keys;
        }

        // ============ BUILD SUMMARY (group by day or month) ============
        // Previous Stock (prevQty/prevVal) = running stock carried in from
        //   before this day/month started.
        // Present Stock (cumQty/cumVal)    = Previous Stock + RCVD - DLVD
        //   for this day/month (i.e. the stock balance as of this period).
        function buildSummary() {
            const map = new Map();

            rawTxns.forEach(txn => {
                const key = viewMode === 'daily' ? txn.txn_date : txn.txn_date.slice(0, 7); // YYYY-MM
                if (!map.has(key)) {
                    map.set(key, {
                        period: key,
                        rcvdQty: 0, rcvdVal: 0,
                        dlvdQty: 0, dlvdVal: 0,
                        entries: 0
                    });
                }
                const row = map.get(key);
                const qty = parseFloat(txn.qty) || 0;
                const val = parseFloat(txn.line_value) || 0;
                if (txn.type === 'RCVD') { row.rcvdQty += qty; row.rcvdVal += val; }
                else { row.dlvdQty += qty; row.dlvdVal += val; }
                row.entries += 1;
            });

            // Fill in zero-activity days/months across the selected range (e.g. today,
            // before anything has been posted for it) so they still show up as rows.
            const dateFrom = document.getElementById('fDateFrom').value;
            const dateTo = document.getElementById('fDateTo').value;
            const allKeys = generatePeriodKeys(dateFrom, dateTo, viewMode);
            if (allKeys) {
                allKeys.forEach(key => {
                    if (!map.has(key)) {
                        map.set(key, { period: key, rcvdQty: 0, rcvdVal: 0, dlvdQty: 0, dlvdVal: 0, entries: 0 });
                    }
                });
            }

            // Walk chronologically. Map insertion order is no longer guaranteed ascending
            // once gap-filled keys are added, so sort explicitly by period key (YYYY-MM-DD
            // or YYYY-MM both sort correctly as plain strings).
            const sortedKeys = Array.from(map.keys()).sort();

            // Pass 1: compute each row's own net (RCVD - DLVD), and the total net across
            // the whole visible range.
            let totalNetQty = 0, totalNetVal = 0;
            const netRows = sortedKeys.map(key => {
                const row = map.get(key);
                const netQty = row.rcvdQty - row.dlvdQty;
                const netVal = row.rcvdVal - row.dlvdVal;
                totalNetQty += netQty;
                totalNetVal += netVal;
                return { ...row, netQty, netVal };
            });

            // Work out the TRUE opening point (stock just before the first visible row)
            // by starting from the live-anchored closing total (last visible row's Present
            // Stock) and subtracting all the net activity in between. This guarantees the
            // last row's Present Stock lands exactly on closingAnchorQty/Val — i.e. matches
            // the dashboard's live "Total Stock Qty / Total Value" — instead of drifting
            // off if we tried to rebuild everything purely from transaction history.
            const openingQty = closingAnchorQty - totalNetQty;
            const openingVal = closingAnchorVal - totalNetVal;

            // Pass 2: walk forward from that true opening point.
            let cumQty = openingQty, cumVal = openingVal;
            summaryRows = netRows.map(row => {
                const prevQty = cumQty;   // stock brought forward from before this period
                const prevVal = cumVal;
                cumQty += row.netQty;     // Present Stock = Previous Stock + RCVD - DLVD
                cumVal += row.netVal;
                return { ...row, prevQty, prevVal, cumQty, cumVal };
            });
        }

        // ============ SORTING ============
        function sortBy(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = column === 'period' ? 'desc' : 'desc';
            }
            renderTable();
        }

        function getSortedRows() {
            const rows = [...summaryRows];
            rows.sort((a, b) => {
                let av, bv;
                switch (sortColumn) {
                    case 'period': av = a.period; bv = b.period; break;
                    case 'rcvdQty': av = a.rcvdQty; bv = b.rcvdQty; break;
                    case 'rcvdVal': av = a.rcvdVal; bv = b.rcvdVal; break;
                    case 'dlvdQty': av = a.dlvdQty; bv = b.dlvdQty; break;
                    case 'dlvdVal': av = a.dlvdVal; bv = b.dlvdVal; break;
                    case 'entries': av = a.entries; bv = b.entries; break;
                    default: av = a.period; bv = b.period;
                }
                if (typeof av === 'number' && typeof bv === 'number') {
                    return sortDirection === 'asc' ? av - bv : bv - av;
                }
                av = String(av); bv = String(bv);
                if (av < bv) return sortDirection === 'asc' ? -1 : 1;
                if (av > bv) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            return rows;
        }

        // ============ SUMMARY CARDS ============
        function renderSummaryCards(rows) {
            let totalRcvdVal = 0, totalDlvdVal = 0, totalEntries = 0;
            rows.forEach(r => {
                totalRcvdVal += r.rcvdVal;
                totalDlvdVal += r.dlvdVal;
                totalEntries += r.entries;
            });
            document.getElementById('statDays').textContent = fmt(rows.length);
            document.getElementById('statRcvdVal').textContent = '$' + fmt(totalRcvdVal);
            document.getElementById('statDlvdVal').textContent = '$' + fmt(totalDlvdVal);
            document.getElementById('statNetVal').textContent = '$' + fmt(totalRcvdVal - totalDlvdVal);
            document.getElementById('statEntries').textContent = fmt(totalEntries);
        }

        // ============ DRILLDOWN MODAL (click RCVD/DLVD cell to see entries) ============
        function showDrilldown(period, type) {
            const filtered = rawTxns.filter(t => {
                const key = viewMode === 'daily' ? t.txn_date : t.txn_date.slice(0, 7);
                return key === period && t.type === type;
            });
            const label = viewMode === 'daily' ? period : monthLabel(period);
            document.getElementById('drilldownTitle').textContent = `${type} Entries — ${label}`;

            let totalQty = 0, totalVal = 0;
            let rowsHtml = filtered.map((t, i) => {
                totalQty += parseFloat(t.qty) || 0;
                totalVal += parseFloat(t.line_value) || 0;
                const buyerName = (t.items && buyerMap[t.items.buyer_id]) || '—';
                return `<tr>
                    <td>${i + 1}</td>
                    <td>${buyerName}</td>
                    <td>${fmt(t.qty)}</td>
                    <td>$${fmt(t.line_value)}</td>
                </tr>`;
            }).join('');

            if (filtered.length === 0) {
                rowsHtml = `<tr><td colspan="4">No ${type} entries found for this period</td></tr>`;
            }

            document.getElementById('drilldownContent').innerHTML = `
                <div class="table-wrapper">
                    <table class="modal-table">
                        <thead><tr><th>#</th><th>Buyer</th><th>Qty</th><th>Value</th></tr></thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                </div>
                <div class="modal-total">Total: ${fmt(totalQty)} qty &middot; $${fmt(totalVal)}</div>
            `;

            document.getElementById('drilldownModal').classList.add('show');
        }

        function closeDrilldown() {
            document.getElementById('drilldownModal').classList.remove('show');
        }

        // ============ RENDER TABLE ============
        function renderTable() {
            const tableContent = document.getElementById('tableContent');
            const rows = getSortedRows();
            renderSummaryCards(rows);

            if (rows.length === 0) {
                tableContent.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No transactions found for this filter</p>
                    </div>
                `;
                return;
            }

            const totalPages = Math.ceil(rows.length / perPage);
            if (currentPage > totalPages) currentPage = totalPages || 1;
            const startIdx = (currentPage - 1) * perPage;
            const endIdx = Math.min(startIdx + perPage, rows.length);
            const pageRows = rows.slice(startIdx, endIdx);

            const periodLabel = viewMode === 'daily' ? 'Date' : 'Month';

            const columns = [
                { key: 'no', label: '#', sortable: false },
                { key: 'period', label: periodLabel, sortable: true },
                { key: 'prevQty', label: 'Previous Stock Qty', sortable: false },
                { key: 'prevVal', label: 'Previous Stock Value', sortable: false },
                { key: 'rcvdQty', label: 'RCVD Qty', sortable: true },
                { key: 'rcvdVal', label: 'RCVD Value', sortable: true },
                { key: 'dlvdQty', label: 'DLVD Qty', sortable: true },
                { key: 'dlvdVal', label: 'DLVD Value', sortable: true },
                { key: 'cumQty', label: 'Present Stock Qty', sortable: false },
                { key: 'cumVal', label: 'Present Stock Value', sortable: false },
                { key: 'entries', label: 'Entries', sortable: true }
            ];

            let html = '<div class="table-wrapper"><table><thead><tr>';
            columns.forEach(col => {
                const isSorted = sortColumn === col.key;
                const sortIcon = isSorted
                    ? (sortDirection === 'asc' ? '<i class="fas fa-sort-up sort-icon"></i>' : '<i class="fas fa-sort-down sort-icon"></i>')
                    : '<i class="fas fa-sort sort-icon"></i>';
                const sortable = col.sortable ? `onclick="sortBy('${col.key}')"` : '';
                const sortedClass = isSorted ? 'sorted' : '';
                html += `<th class="${sortedClass}" ${sortable}>${col.label} ${col.sortable ? sortIcon : ''}</th>`;
            });
            html += '</tr></thead><tbody>';

            pageRows.forEach((r, idx) => {
                const label = viewMode === 'daily' ? r.period : monthLabel(r.period);
                html += `<tr>
                    <td>${startIdx + idx + 1}</td>
                    <td class="date-cell">${label}</td>
                    <td>${fmt(r.prevQty)}</td>
                    <td>$${fmt(r.prevVal)}</td>
                    <td class="clickable" onclick="showDrilldown('${r.period}','RCVD')">${r.rcvdQty > 0 ? fmt(r.rcvdQty) : '—'}</td>
                    <td class="rcvd-val clickable" onclick="showDrilldown('${r.period}','RCVD')">${r.rcvdVal > 0 ? '$' + fmt(r.rcvdVal) : '—'}</td>
                    <td class="clickable" onclick="showDrilldown('${r.period}','DLVD')">${r.dlvdQty > 0 ? fmt(r.dlvdQty) : '—'}</td>
                    <td class="dlvd-val clickable" onclick="showDrilldown('${r.period}','DLVD')">${r.dlvdVal > 0 ? '$' + fmt(r.dlvdVal) : '—'}</td>
                    <td>${fmt(r.cumQty)}</td>
                    <td>$${fmt(r.cumVal)}</td>
                    <td>${fmt(r.entries)}</td>
                </tr>`;
            });

            html += '</tbody>';

            // Grand total footer — based on ALL filtered rows (not just current page).
            // Previous Stock (first row's) and Present Stock (last row's) are shown
            // rather than summed, since summing a running stock balance across days
            // isn't meaningful.
            let gRcvdQty = 0, gRcvdVal = 0, gDlvdQty = 0, gDlvdVal = 0, gEntries = 0;
            rows.forEach(r => {
                gRcvdQty += r.rcvdQty; gRcvdVal += r.rcvdVal;
                gDlvdQty += r.dlvdQty; gDlvdVal += r.dlvdVal;
                gEntries += r.entries;
            });
            // rows may be sorted asc/desc by period, so find true first/last chronologically
            const chronoRows = [...rows].sort((a, b) => a.period < b.period ? -1 : (a.period > b.period ? 1 : 0));
            const openingRow = chronoRows[0];
            const closingRow = chronoRows[chronoRows.length - 1];

            html += `<tfoot><tr>
                <td colspan="2" style="text-align:right;">GRAND TOTAL (all filtered ${viewMode === 'daily' ? 'days' : 'months'}):</td>
                <td>${fmt(openingRow.prevQty)}</td>
                <td>$${fmt(openingRow.prevVal)}</td>
                <td>${fmt(gRcvdQty)}</td>
                <td>$${fmt(gRcvdVal)}</td>
                <td>${fmt(gDlvdQty)}</td>
                <td>$${fmt(gDlvdVal)}</td>
                <td>${fmt(closingRow.cumQty)}</td>
                <td>$${fmt(closingRow.cumVal)}</td>
                <td>${fmt(gEntries)}</td>
            </tr></tfoot>`;

            html += '</table></div>';

            html += `<div class="pagination">
                <div class="pagination-info">
                    Showing ${startIdx + 1}-${endIdx} of ${rows.length} ${viewMode === 'daily' ? 'days' : 'months'}
                </div>
                <div class="pagination-controls">
                    <select class="per-page-select" onchange="changePerPage(this.value)">
                        <option value="30" ${perPage === 30 ? 'selected' : ''}>30 / page</option>
                        <option value="50" ${perPage === 50 ? 'selected' : ''}>50 / page</option>
                        <option value="100" ${perPage === 100 ? 'selected' : ''}>100 / page</option>
                    </select>
                    <button class="page-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-angle-double-left"></i></button>
                    <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-angle-left"></i></button>`;

            const maxButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            html += `
                    <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-angle-right"></i></button>
                    <button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-angle-double-right"></i></button>
                </div>
            </div>`;

            tableContent.innerHTML = html;
        }

        function goToPage(page) {
            const rows = getSortedRows();
            const totalPages = Math.ceil(rows.length / perPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
            document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function changePerPage(value) {
            perPage = parseInt(value, 10) || 50;
            currentPage = 1;
            renderTable();
        }

        // ============ RESET FILTERS ============
        function resetFilters() {
            document.getElementById('fBuyer').value = '';
            viewMode = 'daily';
            document.getElementById('viewDaily').classList.add('active');
            document.getElementById('viewMonthly').classList.remove('active');
            document.getElementById('statDaysLabel').textContent = 'Active Days';
            sortColumn = 'period';
            sortDirection = 'desc';

            document.querySelectorAll('.quick-ranges .btn-sm').forEach(b => b.classList.remove('active'));
            document.getElementById('rangeBtn30d').classList.add('active');

            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 29);
            document.getElementById('fDateTo').value = toLocalISODate(today);
            document.getElementById('fDateFrom').value = toLocalISODate(thirtyDaysAgo);

            applyFilters();
            showToast('Filters reset', 'success');
        }

        // ============ PRINT ============
        function printReport() {
            const rows = getSortedRows();
            if (rows.length === 0) {
                showToast('No data to print', 'error');
                return;
            }
            const now = new Date();
            document.getElementById('printDate').textContent =
                `${viewMode === 'daily' ? 'Daily' : 'Monthly'} View — Generated: ` +
                now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) +
                ' ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            setTimeout(() => window.print(), 300);
        }

        // ============ EXCEL EXPORT ============
        function downloadExcel() {
            const rows = getSortedRows();
            if (rows.length === 0) {
                showToast('No data to download', 'error');
                return;
            }
            showToast('Preparing Excel file...', 'success');

            const periodLabel = viewMode === 'daily' ? 'Date' : 'Month';
            const excelData = rows.map(r => ({
                [periodLabel]: viewMode === 'daily' ? r.period : monthLabel(r.period),
                'Previous Stock Qty': r.prevQty,
                'Previous Stock Value': r.prevVal,
                'RCVD Qty': r.rcvdQty,
                'RCVD Value': r.rcvdVal,
                'DLVD Qty': r.dlvdQty,
                'DLVD Value': r.dlvdVal,
                'Present Stock Qty': r.cumQty,
                'Present Stock Value': r.cumVal,
                'Entries': r.entries
            }));

            let gRcvdQty = 0, gRcvdVal = 0, gDlvdQty = 0, gDlvdVal = 0, gEntries = 0;
            rows.forEach(r => {
                gRcvdQty += r.rcvdQty; gRcvdVal += r.rcvdVal;
                gDlvdQty += r.dlvdQty; gDlvdVal += r.dlvdVal;
                gEntries += r.entries;
            });
            const chronoRows = [...rows].sort((a, b) => a.period < b.period ? -1 : (a.period > b.period ? 1 : 0));
            const openingRow = chronoRows[0];
            const closingRow = chronoRows[chronoRows.length - 1];
            excelData.push({
                [periodLabel]: 'GRAND TOTAL',
                'Previous Stock Qty': openingRow.prevQty, 'Previous Stock Value': openingRow.prevVal,
                'RCVD Qty': gRcvdQty, 'RCVD Value': gRcvdVal,
                'DLVD Qty': gDlvdQty, 'DLVD Value': gDlvdVal,
                'Present Stock Qty': closingRow.cumQty, 'Present Stock Value': closingRow.cumVal,
                'Entries': gEntries
            });

            const ws = XLSX.utils.json_to_sheet(excelData);
            ws['!cols'] = [
                { wch: 16 }, { wch: 16 }, { wch: 18 }, { wch: 12 }, { wch: 14 },
                { wch: 12 }, { wch: 14 }, { wch: 16 }, { wch: 18 }, { wch: 10 }
            ];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, viewMode === 'daily' ? 'Day Book' : 'Month Book');

            const dateStr = toLocalISODate(new Date());
            XLSX.writeFile(wb, `GMS-DayBook-${viewMode}-${dateStr}.xlsx`);
            showToast('Excel file downloaded!', 'success');
        }

        // ============ INIT ============
        document.addEventListener('DOMContentLoaded', async () => {
            await loadFilters();
            await loadData();
        });

        document.querySelectorAll('.filter-group input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') applyFilters();
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDrilldown();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('../sw.js').catch(() => {});
        }
    </script>
</body>
</html>
