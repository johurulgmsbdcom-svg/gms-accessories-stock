<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Challan / MRR Report — GMS Accessories Stock</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-strong: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
        }

        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-bg-strong: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-3d {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: linear-gradient(135deg, #0a1628 0%, #1a1a3e 25%, #0f2027 50%, #203a43 75%, #0a1628 100%);
            background-size: 400% 400%; animation: gradientShift 15s ease infinite;
        }

        [data-theme="light"] .bg-3d {
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 25%, #dbeafe 50%, #e0e7ff 75%, #f0f4ff 100%);
            background-size: 400% 400%; animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .orb {
            position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.4; z-index: -1;
            animation: float 20s ease-in-out infinite;
        }
        .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, var(--accent-blue), transparent); top: -100px; right: -100px; }
        .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, var(--accent-purple), transparent); bottom: -80px; left: -80px; animation-delay: -5s; }
        .orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, var(--accent-pink), transparent); top: 50%; left: 50%; animation-delay: -10s; }
        .orb-4 { width: 180px; height: 180px; background: radial-gradient(circle, var(--accent-cyan), transparent); top: 20%; left: 10%; animation-delay: -15s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 10px) scale(1.05); }
        }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: var(--glass-shadow);
        }

        .header {
            padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; background: rgba(10, 22, 40, 0.8);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
        }
        [data-theme="light"] .header { background: rgba(255, 255, 255, 0.8); }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn {
            width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text-primary); font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; text-decoration: none;
        }
        .logo-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 18px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .header-title {
            font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        [data-theme="light"] .header-title {
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .header-actions { display: flex; gap: 8px; }
        .header-btn {
            width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text-primary); font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
        }
        .header-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

        .page-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .page-title h2 {
            font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            display: flex; align-items: center; gap: 10px;
        }
        .page-title h2 i { -webkit-text-fill-color: var(--accent-blue); }
        .title-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px; border: none; border-radius: 10px; font-family: 'Poppins', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px; color: white;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2); }
        .btn-excel { background: linear-gradient(135deg, var(--accent-green), #059669); }
        .btn-print { background: linear-gradient(135deg, var(--accent-cyan), #0891b2); }
        .btn-reset { background: linear-gradient(135deg, var(--accent-yellow), #d97706); color: #1e293b; }
        .btn-search { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); }

        .filter-card { padding: 20px; margin-bottom: 20px; animation: fadeInUp 0.5s ease; }
        .filter-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .filter-title i { color: var(--accent-blue); }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-group input, .filter-group select {
            padding: 10px 12px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2); color: var(--text-primary); font-family: 'Poppins', sans-serif;
            font-size: 13px; outline: none; transition: all 0.3s;
        }
        [data-theme="light"] .filter-group input, [data-theme="light"] .filter-group select { background: rgba(255, 255, 255, 0.7); }
        .filter-group input:focus, .filter-group select:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .filter-group input::placeholder { color: var(--text-muted); }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { padding: 16px; text-align: center; transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-4px); }
        .stat-card .stat-value { font-size: 20px; font-weight: 800; line-height: 1.2; word-break: break-all; }
        .stat-card .stat-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        .stat-card.blue .stat-value { color: var(--accent-blue); }
        .stat-card.green .stat-value { color: var(--accent-green); }
        .stat-card.red .stat-value { color: var(--accent-red); }
        .stat-card.yellow .stat-value { color: var(--accent-yellow); }
        .stat-card.purple .stat-value { color: var(--accent-purple); }

        .table-card { padding: 20px; margin-bottom: 20px; animation: fadeInUp 0.7s ease; }
        .table-wrapper { overflow-x: auto; border-radius: 12px; margin: 0 -4px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1050px; border: 1px solid var(--glass-border); }
        
        thead.main-head th {
            padding: 10px 8px; text-align: left; font-weight: 700; font-size: 9px;
            text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
            background: rgba(0, 0, 0, 0.25); border: 1px solid var(--glass-border); white-space: nowrap;
        }
        [data-theme="light"] thead.main-head th { background: rgba(255, 255, 255, 0.5); }
        
        tbody td { padding: 8px; color: var(--text-secondary); white-space: nowrap; font-size: 12px; border: 1px solid var(--glass-border); }
        
        tr.challan-head td {
            background: rgba(59, 130, 246, 0.18); font-weight: 700; color: var(--text-primary);
            font-size: 12.5px; padding: 10px 8px; border-top: 2px solid var(--accent-blue);
        }
        tr.challan-head .badge {
            display: inline-block; padding: 2px 8px; border-radius: 6px;
            font-size: 10px; font-weight: 700; margin-left: 6px;
        }
        tr.challan-head .badge.rcvd { background: rgba(16,185,129,0.25); color: var(--accent-green); }
        tr.challan-head .badge.dlvd { background: rgba(239,68,68,0.25); color: var(--accent-red); }
        tr.challan-head .badge.mixed { background: rgba(245,158,11,0.25); color: var(--accent-yellow); }

        tr.item-row:hover { background: rgba(59, 130, 246, 0.08); }
        tr.item-row .type-tag { padding: 2px 7px; border-radius: 5px; font-size: 9px; font-weight: 700; }
        .type-tag.rcvd { background: rgba(16,185,129,0.18); color: var(--accent-green); }
        .type-tag.dlvd { background: rgba(239,68,68,0.18); color: var(--accent-red); }

        tr.challan-total td {
            background: rgba(139, 92, 246, 0.12); font-weight: 700;
            color: var(--text-primary); border-top: 1.5px solid var(--accent-purple);
        }

        .loading-state, .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .loading-state i { font-size: 40px; color: var(--accent-blue); margin-bottom: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .pagination { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 0; flex-wrap: wrap; gap: 12px; }
        .pagination-info { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .pagination-controls { display: flex; gap: 6px; align-items: center; }
        .page-btn {
            min-width: 36px; height: 36px; padding: 0 12px; border-radius: 8px;
            border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-primary);
            font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .page-btn:hover:not(:disabled) { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        .page-btn.active { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border-color: transparent; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .per-page-select {
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text-primary); font-family: 'Poppins', sans-serif;
            font-size: 12px; outline: none; cursor: pointer;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 22, 40, 0.9);
            backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; padding: 8px 0 10px; z-index: 100; overflow-x: auto;
        }
        [data-theme="light"] .bottom-nav { background: rgba(255, 255, 255, 0.9); }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none;
            color: var(--text-muted); font-size: 10px; font-weight: 600; padding: 6px 10px;
            border-radius: 8px; transition: all 0.3s; flex-shrink: 0;
        }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item:hover { color: var(--accent-blue); }
        .nav-item .nav-icon { font-size: 18px; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: var(--glass-bg-strong); backdrop-filter: blur(20px); color: var(--text-primary);
            padding: 12px 22px; border-radius: 12px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); z-index: 500; font-size: 13px; font-weight: 600;
            display: flex; align-items: center; gap: 10px; transition: transform 0.4s ease;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-left: 4px solid var(--accent-red); }
        .toast.success { border-left: 4px solid var(--accent-green); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .bg-3d, .orb, .header, .bottom-nav, .filter-card, .page-title, .stats-row, .toast, .title-actions { display: none !important; }
            .main { padding: 0 !important; max-width: 100% !important; }
            .table-card { background: white !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
            table { border: 1.5px solid black !important; font-size: 9px !important; }
            thead.main-head th, tbody td { border: 1px solid black !important; color: black !important; background: white !important; }
            tr.challan-head td, tr.challan-total td { background: #eee !important; color: black !important; }
            .print-header { display: block !important; text-align: center; margin-bottom: 12px; }
        }
        .print-header { display: none; }

        @media (max-width: 768px) {
            .main { padding: 16px; }
            .filter-grid { grid-template-columns: 1fr 1fr; }
            .page-title h2 { font-size: 18px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .btn { padding: 8px 14px; font-size: 12px; }
        }
        @media (max-width: 480px) {
            .filter-grid { grid-template-columns: 1fr; }
            .title-actions { width: 100%; }
            .title-actions .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-3d"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="print-header">
        <h2>GMS Accessories Stock — Challan / MRR Wise Report</h2>
        <p id="printDate"></p>
    </div>

    <header class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="logo-icon">G</div>
            <div class="header-title">Challan / MRR Report</div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleTheme()" id="themeBtn" title="Theme"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="main">
        <div class="page-title">
            <h2><i class="fas fa-file-invoice"></i> Challan / MRR Wise Report</h2>
            <div class="title-actions">
                <button class="btn btn-reset" onclick="resetFilters()"><i class="fas fa-redo"></i> Reset</button>
                <button class="btn btn-print" onclick="printReport()"><i class="fas fa-print"></i> Print</button>

                    <label>Item / Item Code</label>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home nav-icon"></i> Home</a>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line nav-icon"></i> Dashboard</a>

        <i class="fas fa-check-circle" id="toastIcon"></i>
        <span id="toastMsg">Success!</span>
    </div>

    <script>
        const SUPABASE_URL = 'https://qwtourjspllhiiryqewf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pcQFRFQWWAT1zTXfVfgdSw_43rcVr5S';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let groupedChallans = [];
        let currentPage = 1;
        let perPage = 50;

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }
        function updateThemeIcon(theme) {
            const btn = document.getElementById('themeBtn');
            btn.innerHTML = theme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        }
        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeIcon(saved);
        })();

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMsg');
            toast.className = 'toast ' + type;
            icon.className = type === 'error' ? 'fas fa-times-circle' : 'fas fa-check-circle';
            msg.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function fmt(n) {
            if (n === null || n === undefined || isNaN(n)) return '0';
            return parseFloat(n).toLocaleString('en-US', { maximumFractionDigits: 2 });
        }

        async function loadFilters() {
            try {
                const { data: buyers } = await db.from('buyers').select('id, name').order('name');
                const buyerSelect = document.getElementById('fBuyer');
                (buyers || []).forEach(b => {
                    buyerSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`;
                });

                const today = new Date();
                const thirtyDaysAgo = new Date(today);
                thirtyDaysAgo.setDate(today.getDate() - 30);
                document.getElementById('fDateTo').value = today.toISOString().split('T')[0];
                document.getElementById('fDateFrom').value = thirtyDaysAgo.toISOString().split('T')[0];
            } catch (err) {
                console.error('Load filters error:', err);
            }
        }

        function applyFilters() {
            currentPage = 1;
            loadData();
        }

        async function loadData() {
            const tableContent = document.getElementById('tableContent');
            tableContent.innerHTML = `<div class="loading-state"><i class="fas fa-circle-notch"></i><p>Loading challan data...</p></div>`;

            try {
                let query = db
                    .from('transactions')
                    .select(`
                        id, type, txn_date, qty, unit_price_snapshot, line_value,
                        challan_no, mrr_no, order_no, style_no, remarks, supplier,
                        items:item_id!inner (
                            id, description, unit, item_code, buyer_id,
                            buyers:buyer_id (name)
                        )
                    `)
                    .in('type', ['RCVD', 'DLVD'])
                    .order('txn_date', { ascending: false })
                    .order('created_at', { ascending: false });

                const dateFrom = document.getElementById('fDateFrom').value;
                const dateTo = document.getElementById('fDateTo').value;
                const buyerId = document.getElementById('fBuyer').value;
                const type = document.getElementById('fType').value;
                const challan = document.getElementById('fChallan').value.trim();
                const mrr = document.getElementById('fMrr').value.trim();
                const itemText = document.getElementById('fItem').value.trim();

                if (dateFrom) query = query.gte('txn_date', dateFrom);
                if (dateTo) query = query.lte('txn_date', dateTo);
                if (buyerId) query = query.eq('items.buyer_id', buyerId);
                if (type) query = query.eq('type', type);
                if (challan) query = query.ilike('challan_no', `%${challan}%`);
                if (mrr) query = query.ilike('mrr_no', `%${mrr}%`);
                if (itemText) {
                    query = query.or(`description.ilike.%${itemText}%,item_code.ilike.%${itemText}%`, { foreignTable: 'items' });
                }

                const { data, error } = await query.limit(10000);
                if (error) throw error;

                groupChallans(data || []);
                renderSummary();
                renderTable();

            } catch (err) {
                console.error('Load data error:', err);
                tableContent.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error: ${err.message}</p></div>`;
                showToast('Error loading data', 'error');
            }
        }

        function groupChallans(rows) {
            const map = new Map();
            rows.forEach(r => {
                const key = r.challan_no || '(No Challan No)';
                if (!map.has(key)) {
                    map.set(key, {
                        challanNo: r.challan_no || '(No Challan No)',
                        mrrNo: null,
                        dateMin: r.txn_date,
                        dateMax: r.txn_date,
                        buyers: new Set(),
                        types: new Set(),
                        lines: [],
                        totalRcvdQty: 0, totalRcvdVal: 0,
                        totalDlvdQty: 0, totalDlvdVal: 0
                    });
                }
                const g = map.get(key);
                if (r.mrr_no && !g.mrrNo) g.mrrNo = r.mrr_no;
                if (r.txn_date < g.dateMin) g.dateMin = r.txn_date;
                if (r.txn_date > g.dateMax) g.dateMax = r.txn_date;
                g.buyers.add(r.items?.buyers?.name || 'Unknown');
                g.types.add(r.type);
                g.lines.push(r);

                const qty = parseFloat(r.qty) || 0;
                const val = parseFloat(r.line_value) || 0;
                if (r.type === 'RCVD') { g.totalRcvdQty += qty; g.totalRcvdVal += val; }
                else { g.totalDlvdQty += qty; g.totalDlvdVal += val; }
            });
            groupedChallans = Array.from(map.values());
        }

        function renderSummary() {
            const uniqueMrr = new Set(groupedChallans.map(g => g.mrrNo).filter(Boolean));
            let totalRcvdVal = 0, totalDlvdVal = 0, totalLines = 0;
            groupedChallans.forEach(g => {
                totalRcvdVal += g.totalRcvdVal;
                totalDlvdVal += g.totalDlvdVal;
                totalLines += g.lines.length;
            });

            document.getElementById('statChallans').textContent = fmt(groupedChallans.length);
            document.getElementById('statMrr').textContent = fmt(uniqueMrr.size);
            document.getElementById('statRcvdVal').textContent = '$' + fmt(totalRcvdVal);
            document.getElementById('statDlvdVal').textContent = '$' + fmt(totalDlvdVal);
            document.getElementById('statLines').textContent = fmt(totalLines);
        }

        function renderTable() {
            const tableContent = document.getElementById('tableContent');
            if (groupedChallans.length === 0) {
                tableContent.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>No challan entries found for this filter</p></div>`;
                return;
            }

            const totalPages = Math.ceil(groupedChallans.length / perPage);
            if (currentPage > totalPages) currentPage = totalPages || 1;
            const startIdx = (currentPage - 1) * perPage;
            const endIdx = Math.min(startIdx + perPage, groupedChallans.length);
            const pageGroups = groupedChallans.slice(startIdx, endIdx);

            let html = '<div class="table-wrapper"><table>';
            html += `<thead class="main-head"><tr>
                <th>#</th><th>Item</th><th>Item Code</th><th>Unit</th><th>Type</th>
                <th>Qty</th><th>Price</th><th>Value</th><th>Order No</th><th>Style No</th><th>Remarks</th>
            </tr></thead><tbody>`;

            pageGroups.forEach((g, gi) => {
                const typeBadgeClass = g.types.size > 1 ? 'mixed' : (g.types.has('RCVD') ? 'rcvd' : 'dlvd');
                const typeBadgeText = g.types.size > 1 ? 'MIXED' : (g.types.has('RCVD') ? 'RCVD' : 'DLVD');
                const dateLabel = g.dateMin === g.dateMax ? g.dateMin : `${g.dateMin} → ${g.dateMax}`;
                const buyerLabel = Array.from(g.buyers).join(', ');

                html += `<tr class="challan-head">
                    <td colspan="11">
                        <i class="fas fa-file-invoice"></i> Challan: ${g.challanNo}
                        ${g.mrrNo ? `&nbsp;|&nbsp; MRR: ${g.mrrNo}` : ''}
                        &nbsp;|&nbsp; ${dateLabel}
                        &nbsp;|&nbsp; Buyer: ${buyerLabel}
                        <span class="badge ${typeBadgeClass}">${typeBadgeText}</span>
                    </td>
                </tr>`;

                g.lines.forEach(r => {
                    const item = r.items || {};
                    const typeTagClass = r.type === 'RCVD' ? 'rcvd' : 'dlvd';
                    html += `<tr class="item-row">
                        <td></td>
                        <td>${item.description || ''}</td>
                        <td>${item.item_code || ''}</td>
                        <td>${item.unit || ''}</td>
                        <td><span class="type-tag ${typeTagClass}">${r.type}</span></td>
                        <td>${fmt(r.qty)}</td>
                        <td>${parseFloat(r.unit_price_snapshot || 0).toFixed(4)}</td>
                        <td>$${fmt(r.line_value)}</td>
                        <td>${r.order_no || ''}</td>
                        <td>${r.style_no || ''}</td>
                        <td>${r.remarks || ''}</td>
                    </tr>`;
                });

                let totalsLabel = '';
                if (g.totalRcvdQty > 0) totalsLabel += `RCVD: ${fmt(g.totalRcvdQty)} qty / $${fmt(g.totalRcvdVal)}  `;
                if (g.totalDlvdQty > 0) totalsLabel += `DLVD: ${fmt(g.totalDlvdQty)} qty / $${fmt(g.totalDlvdVal)}`;

                html += `<tr class="challan-total">
                    <td colspan="11" style="text-align:right;">Challan Total &nbsp;→&nbsp; ${totalsLabel}</td>
                </tr>`;
            });

            html += '</tbody></table></div>';
            html += `<div class="pagination">
                <div class="pagination-info">Showing ${groupedChallans.length === 0 ? 0 : startIdx + 1}-${endIdx} of ${groupedChallans.length} challans</div>
                <div class="pagination-controls">
                    <select class="per-page-select" onchange="changePerPage(this.value)">
                        <option value="25" ${perPage === 25 ? 'selected' : ''}>25 / page</option>
                        <option value="50" ${perPage === 50 ? 'selected' : ''}>50 / page</option>
                        <option value="100" ${perPage === 100 ? 'selected' : ''}>100 / page</option>
                    </select>
                    <button class="page-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-angle-double-left"></i></button>
                    <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-angle-left"></i></button>`;

            const maxButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            html += `
                    <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-angle-right"></i></button>
                    <button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-angle-double-right"></i></button>
                </div>
            </div>`;

            tableContent.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(groupedChallans.length / perPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
            document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function changePerPage(value) {
            perPage = parseInt(value, 10) || 50;
            currentPage = 1;
            renderTable();
        }

        function resetFilters() {
            document.getElementById('fBuyer').value = '';
            document.getElementById('fType').value = '';
            document.getElementById('fChallan').value = '';
            document.getElementById('fMrr').value = '';
            document.getElementById('fItem').value = '';

            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 30);
            document.getElementById('fDateTo').value = today.toISOString().split('T')[0];
            document.getElementById('fDateFrom').value = thirtyDaysAgo.toISOString().split('T')[0];

            applyFilters();
            showToast('Filters reset', 'success');
        }

        function printReport() {
            if (groupedChallans.length === 0) { showToast('No data to print', 'error'); return; }
            const now = new Date();
            document.getElementById('printDate').textContent =
                'Generated: ' + now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) +
                ' ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            setTimeout(() => window.print(), 300);
        }

        function downloadExcel() {
            if (groupedChallans.length === 0) { showToast('No data to download', 'error'); return; }
            showToast('Preparing Excel file...', 'success');

            const rows = [];
            groupedChallans.forEach(g => {
                g.lines.forEach(r => {
                    const item = r.items || {};
                    rows.push({
                        'Challan No': g.challanNo,
                        'MRR No': g.mrrNo || '',
                        'Date': r.txn_date || '',
                        'Buyer': item.buyers?.name || '',
                        'Item': item.description || '',
                        'Item Code': item.item_code || '',
                        'Unit': item.unit || '',
                        'Type': r.type,
                        'Qty': parseFloat(r.qty) || 0,
                        'Unit Price': parseFloat(r.unit_price_snapshot) || 0,
                        'Value': parseFloat(r.line_value) || 0,
                        'Order No': r.order_no || '',
                        'Style No': r.style_no || '',
                        'Supplier': r.supplier || '',
                        'Remarks': r.remarks || ''
                    });
                });
                rows.push({
                    'Challan No': g.challanNo + ' — TOTAL',
                    'MRR No': g.mrrNo || '',
                    'Date': '', 'Buyer': '', 'Item': '', 'Item Code': '', 'Unit': '', 'Type': '',
                    'Qty': (g.totalRcvdQty - g.totalDlvdQty),
                    'Unit Price': '',
                    'Value': (g.totalRcvdVal - g.totalDlvdVal),
                    'Order No': '', 'Style No': '', 'Supplier': '', 'Remarks': ''
                });
            });

            const ws = XLSX.utils.json_to_sheet(rows);
            ws['!cols'] = [
                { wch: 16 }, { wch: 16 }, { wch: 12 }, { wch: 20 }, { wch: 28 },
                { wch: 16 }, { wch: 8 }, { wch: 8 }, { wch: 10 }, { wch: 10 },
                { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 16 }, { wch: 20 }
            ];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Challan Report');

            const dateStr = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `GMS-Challan-Report-${dateStr}.xlsx`);
            showToast('Excel file downloaded!', 'success');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadFilters();
            await loadData();
        });

        document.querySelectorAll('.filter-group input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') applyFilters();
            });
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('../sw.js').catch(() => {});
        }
    </script>
</body>
</html>
