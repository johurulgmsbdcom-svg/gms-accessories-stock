<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pivot Report — GMS Accessories Stock</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-strong: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
        }

        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-bg-strong: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-3d {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0a1628 0%, #1a1a3e 25%, #0f2027 50%, #203a43 75%, #0a1628 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        [data-theme="light"] .bg-3d {
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 25%, #dbeafe 50%, #e0e7ff 75%, #f0f4ff 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, var(--accent-blue), transparent); top: -100px; right: -100px; }
        .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, var(--accent-purple), transparent); bottom: -80px; left: -80px; animation-delay: -5s; }
        .orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, var(--accent-pink), transparent); top: 50%; left: 50%; animation-delay: -10s; }
        .orb-4 { width: 180px; height: 180px; background: radial-gradient(circle, var(--accent-cyan), transparent); top: 20%; left: 10%; animation-delay: -15s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 10px) scale(1.05); }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        .header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 22, 40, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        [data-theme="light"] .header {
            background: rgba(255, 255, 255, 0.8);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        [data-theme="light"] .header-title {
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .main {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-title h2 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title h2 i {
            -webkit-text-fill-color: var(--accent-blue);
        }

        .title-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-excel {
            background: linear-gradient(135deg, var(--accent-green), #059669);
        }

        .btn-print {
            background: linear-gradient(135deg, var(--accent-cyan), #0891b2);
        }

        .btn-reset {
            background: linear-gradient(135deg, var(--accent-yellow), #d97706);
            color: #1e293b;
        }

        .btn-search {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        }

        .filter-card {
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeInUp 0.5s ease;
            position: relative;
            z-index: 10;
        }

        .filter-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-title i {
            color: var(--accent-blue);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }

        [data-theme="light"] .filter-group input,
        [data-theme="light"] .filter-group select {
            background: rgba(255, 255, 255, 0.7);
        }

        .filter-group input:focus,
        .filter-group select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .filter-group input::placeholder {
            color: var(--text-muted);
        }

        /* Multi-select dropdown styles */
        .multi-select-wrapper {
            position: relative;
            z-index: 1000;
        }

        .multi-select-display {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            cursor: pointer;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }

        [data-theme="light"] .multi-select-display {
            background: rgba(255, 255, 255, 0.7);
        }

        .multi-select-display:hover {
            border-color: var(--accent-blue);
        }

        .multi-select-display .count-badge {
            background: var(--accent-blue);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        .multi-select-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            margin-top: 4px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1001;
            box-shadow: var(--glass-shadow);
        }

        .multi-select-dropdown.show {
            display: block;
        }

        .multi-select-option {
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            font-size: 13px;
        }

        .multi-select-option:hover {
            background: rgba(59, 130, 246, 0.15);
        }

        .multi-select-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--accent-blue);
        }

        .multi-select-actions {
            padding: 10px 12px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.1);
        }

        .multi-select-actions button {
            flex: 1;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        .multi-select-actions .btn-all {
            background: var(--accent-blue);
            color: white;
        }

        .multi-select-actions .btn-none {
            background: var(--accent-red);
            color: white;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-card .stat-value {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
            word-break: break-all;
        }

        .stat-card .stat-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .stat-card.blue .stat-value {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card.green .stat-value {
            background: linear-gradient(135deg, var(--accent-green), #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card.red .stat-value {
            background: linear-gradient(135deg, var(--accent-red), #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card.yellow .stat-value {
            background: linear-gradient(135deg, var(--accent-yellow), #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card.purple .stat-value {
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .table-card {
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeInUp 0.7s ease;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            margin: 0 -4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 1200px;
        }

        thead th {
            padding: 12px 10px;
            text-align: left;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 2px solid var(--glass-border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            position: sticky;
            top: 0;
        }

        [data-theme="light"] thead th {
            background: rgba(255, 255, 255, 0.5);
        }

        thead th:hover {
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        tbody tr {
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, 0.08);
        }

        tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        tbody tr:nth-child(even):hover {
            background: rgba(59, 130, 246, 0.08);
        }

        tbody td {
            padding: 10px;
            color: var(--text-secondary);
            white-space: nowrap;
            font-size: 12px;
        }

        tbody tr.buyer-row {
            background: rgba(59, 130, 246, 0.15);
        }

        tbody tr.buyer-row td {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 13px;
            padding: 12px 10px;
            border-top: 2px solid var(--accent-blue);
        }

        tbody tr.total-row {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(139, 92, 246, 0.3));
        }

        tbody tr.total-row td {
            font-weight: 800;
            color: var(--text-primary);
            font-size: 14px;
            padding: 14px 10px;
            border-top: 3px solid var(--accent-blue);
        }

        .loading-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading-state i {
            font-size: 40px;
            color: var(--accent-blue);
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 22, 40, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 10px;
            z-index: 100;
        }

        [data-theme="light"] .bottom-nav {
            background: rgba(255, 255, 255, 0.9);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-item.active {
            color: var(--accent-blue);
        }

        .nav-item:hover {
            color: var(--accent-blue);
        }

        .nav-item .nav-icon {
            font-size: 18px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--glass-bg-strong);
            backdrop-filter: blur(20px);
            color: var(--text-primary);
            padding: 12px 22px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 500;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.4s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error { border-left: 4px solid var(--accent-red); }
        .toast.success { border-left: 4px solid var(--accent-green); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        @media (max-width: 768px) {
            .main { padding: 16px; }
            .filter-grid { grid-template-columns: 1fr 1fr; }
            .page-title h2 { font-size: 18px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .stat-card .stat-value { font-size: 18px; }
            .btn { padding: 8px 14px; font-size: 12px; }
        }

        @media (max-width: 480px) {
            .filter-grid { grid-template-columns: 1fr; }
            .title-actions { width: 100%; }
            .title-actions .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-3d"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <header class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="logo-icon">G</div>
            <div class="header-title">Pivot Report</div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleTheme()" id="themeBtn" title="Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="page-title">
            <h2><i class="fas fa-table-cells-large"></i> Buyer Wise Balance Value Report</h2>
            <div class="title-actions">
                <button class="btn btn-reset" onclick="resetFilters()">
                    <i class="fas fa-redo"></i> Reset
                </button>
                <button class="btn btn-print" onclick="printReport()">
                    <i class="fas fa-print"></i> Print (A4)
                </button>
                <button class="btn btn-excel" onclick="downloadExcel()">
                    <i class="fas fa-file-excel"></i> Excel
                </button>
            </div>
        </div>

        <div class="filter-card glass">
            <div class="filter-title">
                <i class="fas fa-filter"></i> Filters
            </div>
            <div class="filter-grid">
                <div class="filter-group">
                    <label>Date From</label>
                    <input type="date" id="fDateFrom">
                </div>
                <div class="filter-group">
                    <label>Date To</label>
                    <input type="date" id="fDateTo">
                </div>
                <div class="filter-group">
                    <label>Buyer (Multiple Select)</label>
                    <div class="multi-select-wrapper" id="buyerMultiSelect">
                        <div class="multi-select-display" onclick="toggleBuyerDropdown()">
                            <span id="buyerDisplayText">All Buyers</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="multi-select-dropdown" id="buyerDropdown">
                            <div class="multi-select-actions">
                                <button class="btn-all" onclick="selectAllBuyers()">Select All</button>
                                <button class="btn-none" onclick="deselectAllBuyers()">Clear All</button>
                            </div>
                            <div id="buyerOptions"></div>
                        </div>
                    </div>
                </div>
                <div class="filter-group">
                    <label>Item</label>
                    <input type="text" id="fItem" placeholder="Search item...">
                </div>
                <div class="filter-group" style="justify-content: flex-end;">
                    <button class="btn btn-search" onclick="applyFilters()" style="width: 100%;">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
        </div>

                <div class="stat-value" id="statTotalItems">—</div>

            </div>
            <div class="stat-card glass green">
                <div class="stat-value" id="statPrevQty">—</div>
                <div class="stat-label">Previous Qty</div>
            </div>
            <div class="stat-card glass yellow">
                <div class="stat-value" id="statPrevValue">—</div>
                <div class="stat-label">Previous Value</div>
            </div>
            <div class="stat-card glass purple">
                <div class="stat-value" id="statPresentStock">—</div>
                <div class="stat-label">Present Stock</div>
            </div>
            <div class="stat-card glass red">
                <div class="stat-value" id="statStockValue">—</div>
                <div class="stat-label">Stock Value</div>
            </div>
        </div>

        <div class="table-card glass">
            <div id="tableContent">
                <div class="loading-state">
                    <i class="fas fa-circle-notch"></i>
                    <p>Loading pivot data...</p>
                </div>
            </div>
        </div>

        <a href="index.html" class="nav-item">
            <i class="fas fa-home nav-icon"></i> Home
        </a>

            <i class="fas fa-chart-line nav-icon"></i> Dashboard
        </a>
        <a href="transactions.html" class="nav-item">
            <i class="fas fa-list nav-icon"></i> Ledger
        </a>

            <i class="fas fa-table nav-icon"></i> Pivot
        </a>

            <i class="fas fa-hourglass-half nav-icon"></i> Ageing

            <i class="fas fa-plus-circle nav-icon"></i> New
        </a>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle" id="toastIcon"></i>
        <span id="toastMsg">Success!</span>
    </div>

    <script>
        const SUPABASE_URL = 'https://qwtourjspllhiiryqewf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pcQFRFQWWAT1zTXfVfgdSw_43rcVr5S';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allItems = [];
        let filteredData = [];
        let allBuyers = [];
        let selectedBuyerIds = [];

        // ============ THEME ============
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            const btn = document.getElementById('themeBtn');
            btn.innerHTML = theme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        }

        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeIcon(saved);
        })();

        // ============ TOAST ============
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMsg');
            toast.className = 'toast ' + type;
            icon.className = type === 'error' ? 'fas fa-times-circle' : 'fas fa-check-circle';
            msg.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============ FORMAT ============
        function fmt(n) {
            if (n === null || n === undefined || isNaN(n)) return '0';
            return parseFloat(n).toLocaleString('en-US', { maximumFractionDigits: 2 });
        }

        function fmtCompact(n) {
            if (n === null || isNaN(n)) return '0';
            n = parseFloat(n);
            if (Math.abs(n) >= 1000000) return (n / 1000000).toFixed(2) + 'M';
            if (Math.abs(n) >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toFixed(0);
        }

        // ============ MULTI-SELECT BUYER ============
        function toggleBuyerDropdown() {
            const dropdown = document.getElementById('buyerDropdown');
            dropdown.classList.toggle('show');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('buyerMultiSelect');
            if (wrapper && !wrapper.contains(e.target)) {
                document.getElementById('buyerDropdown').classList.remove('show');
            }
        });

        function selectAllBuyers() {
            selectedBuyerIds = allBuyers.map(b => b.id);
            updateBuyerCheckboxes();
            updateBuyerDisplay();
        }

        function deselectAllBuyers() {
            selectedBuyerIds = [];
            updateBuyerCheckboxes();
            updateBuyerDisplay();
        }

        function toggleBuyerSelection(buyerId) {
            const idx = selectedBuyerIds.indexOf(buyerId);
            if (idx > -1) {
                selectedBuyerIds.splice(idx, 1);
            } else {
                selectedBuyerIds.push(buyerId);
            }
            updateBuyerDisplay();
        }

        function updateBuyerCheckboxes() {
            const options = document.querySelectorAll('.buyer-checkbox');
            options.forEach(cb => {
                cb.checked = selectedBuyerIds.includes(parseInt(cb.value));
            });
        }

        function updateBuyerDisplay() {
            const displayText = document.getElementById('buyerDisplayText');
            if (selectedBuyerIds.length === 0) {
                displayText.innerHTML = 'All Buyers';
            } else if (selectedBuyerIds.length === 1) {
                const buyer = allBuyers.find(b => b.id === selectedBuyerIds[0]);
                displayText.innerHTML = buyer ? buyer.name : '1 Selected';
            } else if (selectedBuyerIds.length === allBuyers.length) {
                displayText.innerHTML = 'All Buyers';
            } else {
                displayText.innerHTML = `${selectedBuyerIds.length} Buyers Selected <span class="count-badge">${selectedBuyerIds.length}</span>`;
            }
        }

        async function loadBuyerOptions() {
            try {
                const { data: buyers } = await db.from('buyers').select('id, name').order('name');
                allBuyers = buyers || [];
                
                const optionsContainer = document.getElementById('buyerOptions');
                optionsContainer.innerHTML = allBuyers.map(b => `
                    <label class="multi-select-option">
                        <input type="checkbox" class="buyer-checkbox" value="${b.id}" 
                               onchange="toggleBuyerSelection(${b.id})">
                        <span>${b.name}</span>
                    </label>
                `).join('');
            } catch (err) {
                console.error('Load buyers error:', err);
            }
        }

        // ============ LOAD FILTERS ============
        async function loadFilters() {
            try {
                await loadBuyerOptions();

                const today = new Date();
                const thirtyDaysAgo = new Date(today);
                thirtyDaysAgo.setDate(today.getDate() - 30);
                document.getElementById('fDateTo').value = today.toISOString().split('T')[0];
                document.getElementById('fDateFrom').value = thirtyDaysAgo.toISOString().split('T')[0];

            } catch (err) {
                console.error('Load filters error:', err);
            }
        }

        async function applyFilters() {
            await loadItems();
        }

        async function loadItems() {
            const tableContent = document.getElementById('tableContent');
            tableContent.innerHTML = `
                <div class="loading-state">
                    <i class="fas fa-circle-notch"></i>
                    <p>Loading pivot data...</p>
                </div>
            `;

            try {
                let query = db
                    .from('items')
                    .select(`
                        id, description, unit, goods_location, current_stock, current_value,
                        buyer_id, supplier, item_code,
                        buyers:buyer_id (name)
                    `)
                    .order('buyers(name)', { ascending: true })
                    .order('description', { ascending: true });

                const itemSearch = document.getElementById('fItem').value.trim();

                // Apply buyer filter (multiple)
                if (selectedBuyerIds.length > 0 && selectedBuyerIds.length < allBuyers.length) {
                    query = query.in('buyer_id', selectedBuyerIds);
                }

                const { data, error } = await query;

                if (error) throw error;

                allItems = data || [];

                if (itemSearch) {
                    allItems = allItems.filter(item => {
                        const desc = (item.description || '').toLowerCase();
                        const code = (item.item_code || '').toLowerCase();
                        const search = itemSearch.toLowerCase();
                        return desc.includes(search) || code.includes(search);
                    });
                }

                filteredData = [...allItems];
                renderPivotTable();

            } catch (err) {
                console.error('Load items error:', err);
                tableContent.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error: ${err.message}</p>
                    </div>
                `;
                showToast('Error loading data', 'error');
            }
        }

        function renderPivotTable() {
            const tableContent = document.getElementById('tableContent');

            if (filteredData.length === 0) {
                tableContent.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No items found</p>
                    </div>
                `;
                return;
            }

            const groups = {};
            filteredData.forEach(item => {
                const buyerName = item.buyers?.name || 'Unknown Buyer';
                if (!groups[buyerName]) groups[buyerName] = [];
                groups[buyerName].push(item);
            });

            const columns = [
                'Buyer', 'Description Of Item', 'Unit', 'Goods Location', 
                'Previous Qty', 'Previous Value', 'Received Qty', 'Received Value', 
                'Delivery Qty', 'Delivery Value', 'Present Stock', 'Stock Value'
            ];

            let html = '<div class="table-wrapper"><table><thead><tr>';
            columns.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += '</tr></thead><tbody>';

            let grandTotal = {
                prevQty: 0, prevValue: 0, rcvdQty: 0, rcvdValue: 0,
                dlvdQty: 0, dlvdValue: 0, presentStock: 0, stockValue: 0
            };

            const buyerNames = Object.keys(groups).sort();
            
            buyerNames.forEach(buyerName => {
                const items = groups[buyerName];
                let buyerTotal = {
                    prevQty: 0, prevValue: 0, rcvdQty: 0, rcvdValue: 0,
                    dlvdQty: 0, dlvdValue: 0, presentStock: 0, stockValue: 0
                };

                items.forEach(item => {
                    const prevQty = parseFloat(item.current_stock) || 0;
                    const prevValue = parseFloat(item.current_value) || 0;
                    
                    buyerTotal.prevQty += prevQty;
                    buyerTotal.prevValue += prevValue;
                    buyerTotal.presentStock += prevQty;
                    buyerTotal.stockValue += prevValue;
                });

                grandTotal.prevQty += buyerTotal.prevQty;
                grandTotal.prevValue += buyerTotal.prevValue;
                grandTotal.presentStock += buyerTotal.presentStock;
                grandTotal.stockValue += buyerTotal.stockValue;

                html += `<tr class="buyer-row">
                    <td colspan="12"><i class="fas fa-building"></i> ${buyerName}</td>
                </tr>`;

                items.forEach(item => {
                    const prevQty = parseFloat(item.current_stock) || 0;
                    const prevValue = parseFloat(item.current_value) || 0;
                    
                    html += `<tr>
                        <td></td>
                        <td>${item.description || ''}</td>
                        <td>${item.unit || ''}</td>
                        <td>${item.goods_location || ''}</td>
                        <td>${fmt(prevQty)}</td>
                        <td>$${fmt(prevValue)}</td>
                        <td>0</td>
                        <td>$0</td>
                        <td>0</td>
                        <td>$0</td>
                        <td>${fmt(prevQty)}</td>
                        <td>$${fmt(prevValue)}</td>
                    </tr>`;
                });

                html += `<tr style="background:rgba(59, 130, 246, 0.1);">
                    <td colspan="4" style="text-align:right; font-weight:700;">${buyerName} Total</td>
                    <td style="font-weight:700;">${fmt(buyerTotal.prevQty)}</td>
                    <td style="font-weight:700;">$${fmt(buyerTotal.prevValue)}</td>
                    <td style="font-weight:700;">${fmt(buyerTotal.rcvdQty)}</td>
                    <td style="font-weight:700;">$${fmt(buyerTotal.rcvdValue)}</td>
                    <td style="font-weight:700;">${fmt(buyerTotal.dlvdQty)}</td>
                    <td style="font-weight:700;">$${fmt(buyerTotal.dlvdValue)}</td>
                    <td style="font-weight:700;">${fmt(buyerTotal.presentStock)}</td>
                    <td style="font-weight:700;">$${fmt(buyerTotal.stockValue)}</td>
                </tr>`;
            });

            html += `<tr class="total-row">
                <td colspan="4" style="text-align:right;">Grand Total</td>
                <td>${fmt(grandTotal.prevQty)}</td>
                <td>$${fmt(grandTotal.prevValue)}</td>
                <td>${fmt(grandTotal.rcvdQty)}</td>
                <td>$${fmt(grandTotal.rcvdValue)}</td>
                <td>${fmt(grandTotal.dlvdQty)}</td>
                <td>$${fmt(grandTotal.dlvdValue)}</td>
                <td>${fmt(grandTotal.presentStock)}</td>
                <td>$${fmt(grandTotal.stockValue)}</td>
            </tr>`;

            html += '</tbody></table></div>';
            tableContent.innerHTML = html;

            document.getElementById('statTotalItems').textContent = fmt(filteredData.length);
            document.getElementById('statPrevQty').textContent = fmt(grandTotal.prevQty);
            document.getElementById('statPrevValue').textContent = '$' + fmt(grandTotal.prevValue);
            document.getElementById('statPresentStock').textContent = fmt(grandTotal.presentStock);
            document.getElementById('statStockValue').textContent = '$' + fmt(grandTotal.stockValue);
        }

        function resetFilters() {
            document.getElementById('fDateFrom').value = '';
            document.getElementById('fDateTo').value = '';
            document.getElementById('fItem').value = '';
            deselectAllBuyers();
            applyFilters();
            showToast('Filters reset', 'success');
        }

        // ============ PRINT REPORT ============
        function printReport() {
            if (filteredData.length === 0) {
                showToast('No data to print', 'error');
                return;
            }

            showToast('Opening print dialog...', 'success');
            
            setTimeout(() => {
                window.print();
            }, 300);
        }

        // ============ DOWNLOAD EXCEL ============
        function downloadExcel() {
            if (filteredData.length === 0) {
                showToast('No data to download', 'error');
                return;
            }

            showToast('Preparing Excel file...', 'success');

            const groups = {};
            filteredData.forEach(item => {
                const buyerName = item.buyers?.name || 'Unknown Buyer';
                if (!groups[buyerName]) groups[buyerName] = [];
                groups[buyerName].push(item);
            });

            let excelData = [];
            let grandTotal = {
                prevQty: 0, prevValue: 0, presentStock: 0, stockValue: 0
            };

            const buyerNames = Object.keys(groups).sort();
            
            buyerNames.forEach(buyerName => {
                const items = groups[buyerName];
                let buyerTotal = { prevQty: 0, prevValue: 0, presentStock: 0, stockValue: 0 };

                items.forEach(item => {
                    const prevQty = parseFloat(item.current_stock) || 0;
                    const prevValue = parseFloat(item.current_value) || 0;
                    
                    buyerTotal.prevQty += prevQty;
                    buyerTotal.prevValue += prevValue;
                    buyerTotal.presentStock += prevQty;
                    buyerTotal.stockValue += prevValue;

                    excelData.push({
                        'Buyer': buyerName,
                        'Description Of Item': item.description || '',
                        'Unit': item.unit || '',
                        'Goods Location': item.goods_location || '',
                        'Previous Qty': prevQty,
                        'Previous Value': prevValue,
                        'Received Qty': 0,
                        'Received Value': 0,
                        'Delivery Qty': 0,
                        'Delivery Value': 0,
                        'Present Stock': prevQty,
                        'Stock Value': prevValue
                    });
                });

                grandTotal.prevQty += buyerTotal.prevQty;
                grandTotal.prevValue += buyerTotal.prevValue;
                grandTotal.presentStock += buyerTotal.presentStock;
                grandTotal.stockValue += buyerTotal.stockValue;

                excelData.push({
                    'Buyer': `${buyerName} Total`,
                    'Description Of Item': '',
                    'Unit': '',
                    'Goods Location': '',
                    'Previous Qty': buyerTotal.prevQty,
                    'Previous Value': buyerTotal.prevValue,
                    'Received Qty': 0,
                    'Received Value': 0,
                    'Delivery Qty': 0,
                    'Delivery Value': 0,
                    'Present Stock': buyerTotal.presentStock,
                    'Stock Value': buyerTotal.stockValue
                });
            });

            excelData.push({
                'Buyer': 'Grand Total',
                'Description Of Item': '',
                'Unit': '',
                'Goods Location': '',
                'Previous Qty': grandTotal.prevQty,
                'Previous Value': grandTotal.prevValue,
                'Received Qty': 0,
                'Received Value': 0,
                'Delivery Qty': 0,
                'Delivery Value': 0,
                'Present Stock': grandTotal.presentStock,
                'Stock Value': grandTotal.stockValue
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(excelData);

            ws['!cols'] = [
                { wch: 25 }, { wch: 35 }, { wch: 8 }, { wch: 15 },
                { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 },
                { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }
            ];

            XLSX.utils.book_append_sheet(wb, ws, 'Pivot Report');

            const today = new Date().toISOString().split('T')[0];
            const fileName = `GMS-Pivot-Report-${today}.xlsx`;

            XLSX.writeFile(wb, fileName);
            showToast(`Downloaded: ${fileName}`, 'success');
        }

        // ============ INIT ============
        document.addEventListener('DOMContentLoaded', async () => {
            await loadFilters();
            await loadItems();
        });

        document.querySelectorAll('.filter-group input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') applyFilters();
            });
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('../sw.js').catch(() => {});
        }
    </script>
