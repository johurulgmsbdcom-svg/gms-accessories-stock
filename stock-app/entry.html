<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entry — GMS Accessories Stock</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a1628;
            --card: #1e293b;
            --card2: #334155;
            --text: #f1f5f9;
            --muted: #cbd5e1;
            --border: #475569;
            --blue: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --purple: #8b5cf6;
            --shadow: 0 4px 20px rgba(0,0,0,0.2);
            --radius: 12px;
        }
        [data-theme="light"] {
            --bg: #f0f4f8;
            --card: #ffffff;
            --card2: #f1f5f9;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
            transition: background 0.3s, color 0.3s;
        }

        /* Header */
        .header {
            background: var(--card);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header-title {
            font-size: 15px;
            font-weight: 700;
        }
        .header-title .type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 6px;
            letter-spacing: 0.5px;
        }
        .type-badge.rcvd { background: rgba(16,185,129,0.2); color: var(--green); }
        .type-badge.dlvd { background: rgba(239,68,68,0.2); color: var(--red); }
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main */
        .main { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .loading-state i {
            font-size: 40px;
            color: var(--blue);
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 40px 20px;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .error-state i {
            font-size: 48px;
            color: var(--red);
            margin-bottom: 16px;
        }
        .error-state h3 {
            margin-bottom: 8px;
            color: var(--text);
        }
        .error-state p {
            color: var(--muted);
            margin-bottom: 20px;
            font-size: 13px;
        }

        /* Item Info Card */
        .item-info-card {
            background: linear-gradient(135deg, var(--blue), var(--purple));
            border-radius: var(--radius);
            padding: 18px;
            color: white;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .item-info-card .item-code {
            font-size: 11px;
            opacity: 0.85;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .item-info-card .item-desc {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .item-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .info-chip {
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 8px 12px;
            backdrop-filter: blur(10px);
        }
        .info-chip .label {
            font-size: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .info-chip .value {
            font-size: 14px;
            font-weight: 700;
            word-break: break-all;
        }
        .info-chip.stock {
            background: rgba(16,185,129,0.25);
            border: 1px solid rgba(16,185,129,0.4);
        }

        /* Form Card */
        .form-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .form-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-header i {
            font-size: 20px;
        }
        .form-header.rcvd i { color: var(--green); }
        .form-header.dlvd i { color: var(--red); }
        .form-header h3 {
            font-size: 15px;
            font-weight: 700;
        }
        .form-body { padding: 20px; }

        /* Form Group */
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group label .required {
            color: var(--red);
            margin-left: 2px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }
        .form-group .hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .form-group .hint i { font-size: 10px; }

        /* Qty input highlight */
        .qty-input {
            font-size: 20px !important;
            font-weight: 700 !important;
            text-align: center;
            padding: 16px !important;
        }

        /* Warning Box */
        .warning-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid var(--red);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 10px;
            color: var(--red);
            font-size: 13px;
            font-weight: 500;
        }
        .warning-box.show { display: flex; }
        .warning-box i { font-size: 18px; }

        /* Form Actions */
        .form-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--card);
            position: sticky;
            bottom: 70px;
            z-index: 50;
        }
        .btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-save {
            background: linear-gradient(135deg, var(--blue), var(--purple));
            color: white;
        }
        .btn-save.rcvd { background: linear-gradient(135deg, var(--green), #059669); }
        .btn-save.dlvd { background: linear-gradient(135deg, var(--red), #dc2626); }
        .btn-save:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
        .btn-retry {
            background: var(--yellow);
            color: #1e293b;
        }
        .btn-retry:hover { background: #d97706; }
        .btn-cancel {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-cancel:hover { background: var(--bg); }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Success Modal */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 16px;
            backdrop-filter: blur(4px);
        }
        .success-overlay.active { display: flex; }
        .success-modal {
            background: var(--card);
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            padding: 30px 24px;
            text-align: center;
            animation: slideUp 0.3s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green), #059669);
            color: white;
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(16,185,129,0.4);
        }
        .success-modal h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--green);
        }
        .success-modal .msg {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .success-details {
            background: var(--bg);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: left;
        }
        .success-details .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }
        .success-details .row .label { color: var(--muted); }
        .success-details .row .value { 
            font-weight: 600; 
            color: var(--text);
            word-break: break-all;
        }
        .success-details .row.highlight .value {
            color: var(--green);
            font-size: 15px;
        }
        .success-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn-home {
            background: linear-gradient(135deg, var(--blue), var(--purple));
            color: white;
        }
        .btn-again {
            background: var(--yellow);
            color: #1e293b;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--card);
            color: var(--text);
            padding: 12px 22px;
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 500;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.4s ease;
            border-left: 4px solid var(--green);
            max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-left-color: var(--red); }
        .toast.warning { border-left-color: var(--yellow); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 10px;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            text-decoration: none;
            color: var(--muted);
            font-size: 10px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-item:hover { color: var(--blue); }
        .nav-item .nav-icon { font-size: 18px; }

        @media (max-width: 400px) {
            .main { padding: 16px; }
            .form-actions { grid-template-columns: 1fr; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="header-title">
                Entry <span class="type-badge" id="headerBadge">—</span>
            </div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <!-- Main -->
    <main class="main">
        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <i class="fas fa-circle-notch"></i>
            <p>Loading item details...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error-state" style="display:none;">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Item পাওয়া যায়নি</h3>
            <p id="errorMsg">কোনো সমস্যা হয়েছে অথবা Item Code ভুল।</p>
            <a href="index.html" class="btn btn-save" style="display:inline-flex; padding:12px 24px;">
                <i class="fas fa-home"></i> Home এ ফিরুন
            </a>
        </div>

        <!-- Main Content (hidden initially) -->
        <div id="mainContent" style="display:none;">
            <!-- Item Info Card -->
            <div class="item-info-card">
                <div class="item-code" id="itemCode">—</div>
                <div class="item-desc" id="itemDesc">—</div>
                <div class="item-info-grid">
                    <div class="info-chip">
                        <div class="label">Buyer</div>
                        <div class="value" id="infoBuyer">—</div>
                    </div>
                    <div class="info-chip">
                        <div class="label">Location</div>
                        <div class="value" id="infoLocation">—</div>
                    </div>
                    <div class="info-chip">
                        <div class="label">Unit Price</div>
                        <div class="value" id="infoPrice">—</div>
                    </div>
                    <div class="info-chip stock">
                        <div class="label">Present Stock</div>
                        <div class="value" id="infoStock">—</div>
                    </div>
                </div>
            </div>

            <!-- Form Card -->
            <div class="form-card">
                <div class="form-header" id="formHeader">
                    <i class="fas fa-download"></i>
                    <h3 id="formTitle">Received Entry</h3>
                </div>
                <div class="form-body">
                    <!-- Warning Box -->
                    <div class="warning-box" id="warningBox">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span id="warningMsg">Warning</span>
                    </div>

                    <!-- Date -->
                    <div class="form-group">
                        <label>Date <span class="required">*</span></label>
                        <input type="date" id="fDate">
                    </div>

                    <!-- Qty -->
                    <div class="form-group">
                        <label>Quantity <span class="required">*</span></label>
                        <input type="number" id="fQty" class="qty-input" placeholder="0" step="any" min="0" input
